services:
  db:
    image: postgres:16-alpine
    container_name: siga-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siga}
      POSTGRES_USER: ${POSTGRES_USER:-siga_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siga_password_secure_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U ${POSTGRES_USER:-siga_user}", "-d ${POSTGRES_DB:-siga}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  backend:
    build: 
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: siga-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  postgres-data:
    driver: local